  <text class="label tech" x="1235" y="932">Container DB</text>

  <rect class="queue" x="700" y="875" width="200" height="105" rx="4"/>
  <text class="label medium" x="800" y="915">Kafka</text>
  <text class="label tech" x="800" y="942">Container Queue</text>

  <rect class="container" x="350" y="875" width="210" height="105" rx="4"/>
  <text class="label medium" x="455" y="912">Recommendation</text>
  <text class="label medium" x="455" y="934">Service</text>
  <text class="label tech" x="455" y="958">Container</text>

  <rect class="external" x="360" y="1035" width="190" height="52" rx="4"/>
  <text class="label medium" x="455" y="1068">RabbitMQ</text>

  <rect class="external" x="610" y="1035" width="250" height="52" rx="4"/>
