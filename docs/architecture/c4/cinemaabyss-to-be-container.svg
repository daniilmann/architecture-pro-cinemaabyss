  <path class="line" d="M800 160 L800 295"/>
  <path class="line" d="M840 160 C910 220 1140 235 1210 295"/>

  <path class="line" d="M375 400 C380 450 675 450 740 485"/>
  <path class="line" d="M800 400 L800 485"/>
  <path class="line" d="M1225 400 C1220 450 925 450 860 485"/>
  <text class="label rel" x="610" y="460">HTTPS/JSON</text>
  <text class="label rel" x="990" y="460">HTTPS/JSON</text>

  <path class="line" d="M900 545 L1440 530"/>
  <path class="line" d="M1330 690 C1410 650 1475 610 1510 580"/>

  <path class="line" d="M705 605 C620 650 310 620 220 690"/>
  <path class="line" d="M745 605 C650 650 545 625 485 690"/>
  <path class="line" d="M785 605 L735 690"/>
  <path class="line" d="M825 605 L965 690"/>
  <path class="line" d="M865 605 C965 650 1160 625 1230 690"/>
