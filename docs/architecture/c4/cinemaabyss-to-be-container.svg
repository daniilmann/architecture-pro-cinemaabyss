<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">CinemaAbyss To-Be C4 Container Diagram</title>
  <desc id="desc">C4 container diagram for CinemaAbyss based on the supplied to-be sketch.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .boundary { fill: #f8fafc; stroke: #475569; stroke-width: 2; stroke-dasharray: 10 8; }
      .person { fill: #77c7e8; stroke: #2563eb; stroke-width: 2; }
      .container { fill: #9fc2f5; stroke: #2f5f9f; stroke-width: 2; }
      .queue { fill: #b6d8ff; stroke: #2563eb; stroke-width: 2; }
      .db { fill: #b6d8ff; stroke: #2563eb; stroke-width: 2; }
      .external { fill: #7bd6c9; stroke: #0f766e; stroke-width: 2; }
      .line { fill: none; stroke: #374151; stroke-width: 2.2; marker-end: url(#arrow); }
      .thin { stroke-width: 1.7; }
      .label { font-family: Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .small { font-size: 15px; }
      .medium { font-size: 18px; font-weight: 700; }
      .tech { font-size: 14px; fill: #374151; }
      .title { font-size: 28px; font-weight: 700; text-anchor: middle; }
      .boundary-title { font-size: 22px; font-weight: 700; fill: #334155; }
      .rel { font-size: 13px; fill: #334155; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>
  <text class="label title" x="800" y="44">CinemaAbyss - To-Be Container Diagram</text>

  <rect class="person" x="700" y="70" width="200" height="90" rx="6"/>
  <text class="label medium" x="800" y="108">Пользователь</text>
  <text class="label tech" x="800" y="132">Person</text>

  <rect class="boundary" x="80" y="210" width="1320" height="820" rx="4"/>
  <text class="label boundary-title" x="740" y="242">КиноБездна</text>

  <rect class="container" x="285" y="295" width="180" height="105" rx="4"/>
  <text class="label medium" x="375" y="334">Веб-приложение</text>
  <text class="label tech" x="375" y="360">Container: Web</text>

  <rect class="container" x="710" y="295" width="180" height="105" rx="4"/>
  <text class="label medium" x="800" y="326">Мобильное</text>
  <text class="label medium" x="800" y="350">приложение</text>
  <text class="label tech" x="800" y="375">Container: Mobile</text>

  <rect class="container" x="1135" y="295" width="180" height="105" rx="4"/>
