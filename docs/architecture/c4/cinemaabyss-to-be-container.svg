  <path class="line" d="M205 795 C245 850 660 830 740 875"/>
  <path class="line" d="M465 795 C500 850 690 835 760 875"/>
  <path class="line" d="M725 795 L785 875"/>
  <path class="line" d="M985 795 C940 850 865 835 820 875"/>
  <path class="line" d="M1245 795 C1165 850 935 835 860 875"/>

  <path class="line thin" d="M260 795 C440 835 1030 835 1150 885"/>
  <path class="line thin" d="M510 795 C680 825 1040 825 1165 885"/>
  <path class="line thin" d="M760 795 C890 835 1065 835 1180 885"/>
  <path class="line thin" d="M1000 795 C1080 825 1140 830 1210 885"/>
  <path class="line thin" d="M1245 795 L1240 870"/>
  <text class="label rel" x="1115" y="850">SQL</text>

  <path class="line" d="M700 930 L560 930"/>
  <path class="line" d="M455 980 L455 1035"/>
  <path class="line" d="M550 1061 L610 1061"/>
  <text class="label rel" x="625" y="916">events</text>
  <text class="label rel" x="580" y="1048">AMQP</text>
</svg>
