  <text class="label tech" x="1225" y="360">Container</text>

  <rect class="container" x="700" y="485" width="200" height="120" rx="4"/>
  <text class="label medium" x="800" y="523">API Gateway</text>
  <text class="label tech" x="800" y="550">Container: Go / HTTP</text>
  <text class="label small" x="800" y="576">Strangler Fig routing</text>

  <rect class="external" x="1440" y="480" width="140" height="100" rx="4"/>
  <text class="label medium" x="1510" y="520">Cloud IAM</text>
  <text class="label tech" x="1510" y="546">External System</text>

  <rect class="container" x="120" y="690" width="170" height="105" rx="4"/>
  <text class="label medium" x="205" y="728">Payment</text>
  <text class="label medium" x="205" y="750">Service</text>
  <text class="label tech" x="205" y="775">Container: Go</text>

  <rect class="container" x="380" y="690" width="170" height="105" rx="4"/>
