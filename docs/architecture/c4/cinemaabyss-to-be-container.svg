  <text class="label medium" x="465" y="750">Service</text>
  <text class="label tech" x="465" y="775">Container: Go</text>

  <rect class="container" x="640" y="690" width="170" height="105" rx="4"/>
  <text class="label medium" x="725" y="728">Films</text>
  <text class="label medium" x="725" y="750">Service</text>
  <text class="label tech" x="725" y="775">Container: Go</text>

  <rect class="container" x="900" y="690" width="170" height="105" rx="4"/>
  <text class="label medium" x="985" y="728">Tariffs</text>
  <text class="label medium" x="985" y="750">Service</text>
  <text class="label tech" x="985" y="775">Container: Go</text>

  <rect class="container" x="1160" y="690" width="170" height="105" rx="4"/>
